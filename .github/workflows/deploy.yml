name: Deploy site

on:
  push:
    branches:
      - master
      - main
    paths:
      - "assets/**"
      - "database/json/**"
      - "database/build/**"
      - "database/pyscripts/**"
      - "database/schema/**"
      - "docs/**"
      - "**.bib"
      - "**/*.md"
      - "**.yml"
      - "requirements-dev.txt"
      - "requirements-docs.txt"
      - "!.github/workflows/axe.yml"
      - "!.github/workflows/broken-links.yml"
      - "!.github/workflows/deploy-docker-tag.yml"
      - "!.github/workflows/deploy-image.yml"
      - "!.github/workflows/docker-slim.yml"
      - "!.github/workflows/lighthouse-badger.yml"
      - "!.github/workflows/prettier.yml"
      - "!lighthouse_results/**"
      - "!CONTRIBUTING.md"
      - "!CUSTOMIZE.md"
      - "!FAQ.md"
      - "!INSTALL.md"
      - "!README.md"
      - "!worker/**"
  pull_request:
    branches:
      - master
      - main
    paths:
      - "assets/**"
      - "database/json/**"
      - "database/build/**"
      - "database/pyscripts/**"
      - "database/schema/**"
      - "docs/**"
      - "**.bib"
      - "**/*.md"
      - "**.yml"
      - "requirements-dev.txt"
      - "requirements-docs.txt"
      - "!.github/workflows/axe.yml"
      - "!.github/workflows/broken-links.yml"
      - "!.github/workflows/deploy-docker-tag.yml"
      - "!.github/workflows/deploy-image.yml"
      - "!.github/workflows/docker-slim.yml"
      - "!.github/workflows/lighthouse-badger.yml"
      - "!.github/workflows/prettier.yml"
      - "!lighthouse_results/**"
      - "!CONTRIBUTING.md"
      - "!CUSTOMIZE.md"
      - "!FAQ.md"
      - "!INSTALL.md"
      - "!README.md"
      - "!worker/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Python 🐍
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Python deps
        run: |
          pip install -r requirements-dev.txt
          pip install -r requirements-docs.txt

      - name: Validate JSON terms ✅
        run: |
          python database/pyscripts/validate.py \
            --dir database/json \
            --schema database/schema/v1/term.schema.json \
            --filename-match

      - name: Build search index 🔍
        run: |
          python database/pyscripts/process.py --index-only \
            --json-dir database/json \
            --build-dir database/build

      - name: Build bibliography JSON 📚
        run: |
          python database/pyscripts/bib2json.py \
            --input assets/bibliography/papers.bib \
            --output database/build/bib.json \
            --pretty

      - name: Generate MkDocs pages 📝
        run: python database/pyscripts/json2mkdocs.py

      - name: Build MkDocs site 🏗️
        run: mkdocs build --strict

      - name: Publish API & schema artifacts 📦
        run: |
          mkdir -p site/api site/schema/v1 site/terms
          cp database/openapi/pswiki.v1.yaml site/api/openapi.yaml
          if [ -f database/build/index.json ]; then cp database/build/index.json site/api/; fi
          if [ -f database/build/tags.json ]; then cp database/build/tags.json site/api/; fi
          cp database/schema/v1/term.schema.json site/schema/v1/
          if [ -f database/schema/CHANGELOG.md ]; then cp database/schema/CHANGELOG.md site/schema/; fi
          cp database/json/*.json site/terms/

      - name: Deploy 🚀
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: site
