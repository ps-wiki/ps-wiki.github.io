name: Reference Health

on:
  schedule:
    # 8th of Jan / Apr / Jul / Oct at 08:00 UTC — mid-month, reliably a weekday
    - cron: "0 8 8 1,4,7,10 *"
  push:
    branches: [main]
    paths:
      - "assets/bibliography/papers.bib"
  workflow_dispatch:
    inputs:
      recover:
        description: "Query Wayback Machine for broken NERC URLs"
        type: boolean
        default: true

permissions:
  contents: read
  issues: write

jobs:
  # -------------------------------------------------------------------------
  # Job 1: run the scanner and upload the report as an artifact
  # -------------------------------------------------------------------------
  scan:
    name: Scan references
    runs-on: ubuntu-latest
    outputs:
      broken_count: ${{ steps.count.outputs.broken_count }}
      artifact_url: ${{ steps.upload.outputs.artifact-url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install deps
        run: pip install -r requirements-dev.txt

      - name: Run reference scan
        # --recover (Wayback lookup) is for the periodic sweep, not push validation.
        # Push runs just validate that the URLs in the edited bib are reachable;
        # recovery (finding archives for dead links) belongs to the scheduled/manual sweep.
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            python pswiki.py check-refs
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.recover }}" == "false" ]]; then
            python pswiki.py check-refs
          else
            python pswiki.py check-refs --recover
          fi
          # The CLI exits 1 if broken links found; we capture that in the next step
          # so we don't fail the workflow here — reporting job handles it
        continue-on-error: true

      - name: Extract broken count
        id: count
        run: |
          BROKEN=$(python -c "
          import json
          r = json.load(open('database/build/reference_check.json'))
          s = r['summary']
          print(s.get('broken', 0) + s.get('server_error', 0))
          ")
          echo "broken_count=$BROKEN" >> "$GITHUB_OUTPUT"

      - name: Upload report artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: reference_check
          path: database/build/reference_check.json
          retention-days: 90

  # -------------------------------------------------------------------------
  # Job 2: report results as a GitHub issue (one issue per breakage incident)
  #
  # Model: at most one OPEN ref-health issue at a time.
  #   - broken found, none open  -> open a new dated incident issue
  #   - broken found, one open   -> ongoing incident: refresh body (+ comment)
  #   - all clean, one open      -> resolved: close it (stays as a record)
  #   - all clean, none open     -> healthy steady state: do nothing
  # This gives discrete, trackable incidents without spawning a new issue on
  # every re-scan of the same breakage, and no noise while references are OK.
  # -------------------------------------------------------------------------
  report:
    name: Report reference health
    needs: scan
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BROKEN: ${{ needs.scan.outputs.broken_count }}
      ARTIFACT_URL: ${{ needs.scan.outputs.artifact_url }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Download scan artifact
        uses: actions/download-artifact@v4
        with:
          name: reference_check
          path: database/build

      - name: Render issue body
        run: |
          python database/pyscripts/render_ref_issue.py \
            --report database/build/reference_check.json \
            --artifact-url "$ARTIFACT_URL" \
            --sha "${{ github.sha }}" \
            --trigger "${{ github.event_name }}" \
            --run-url "$RUN_URL" \
            > /tmp/issue_body.md

      - name: Report incident
        env:
          IS_PUSH: ${{ github.event_name == 'push' }}
        run: |
          SCAN_DATE=$(date -u +%Y-%m-%d)
          SHA_SHORT="${{ github.sha }}"
          SHA_SHORT="${SHA_SHORT:0:7}"

          # At most one open incident at a time — find it, if any.
          OPEN_ISSUE=$(gh issue list \
            --repo "${{ github.repository }}" \
            --label ref-health \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [ "$BROKEN" -gt 0 ]; then
            if [ -n "$OPEN_ISSUE" ]; then
              # Ongoing incident — refresh the body; note the re-scan (skip on push).
              gh issue edit "$OPEN_ISSUE" \
                --repo "${{ github.repository }}" \
                --body-file /tmp/issue_body.md
              if [ "$IS_PUSH" != "true" ]; then
                gh issue comment "$OPEN_ISSUE" \
                  --repo "${{ github.repository }}" \
                  --body "**Re-scan — ${SCAN_DATE}** · ⚠️ still **${BROKEN} broken link(s)** · trigger \`${{ github.event_name }}\` · commit \`${SHA_SHORT}\` · [view run](${RUN_URL}) · [report](${ARTIFACT_URL})"
              fi
              echo "Updated open incident #$OPEN_ISSUE"
            else
              # New incident — open a fresh, dated issue.
              # NOTE: gh issue create prints the issue URL (no --json), so parse the number from it.
              ISSUE_URL=$(gh issue create \
                --repo "${{ github.repository }}" \
                --title "[CI] Reference Health — ${BROKEN} broken link(s) (${SCAN_DATE})" \
                --body-file /tmp/issue_body.md \
                --label ref-health)
              echo "Opened new incident ${ISSUE_URL##*/}"
            fi
          else
            if [ -n "$OPEN_ISSUE" ]; then
              # Resolved — close the incident; it remains as a historical record.
              gh issue close "$OPEN_ISSUE" \
                --repo "${{ github.repository }}" \
                --comment "✅ All references OK as of ${SCAN_DATE} (trigger \`${{ github.event_name }}\`, commit \`${SHA_SHORT}\`). Resolved automatically." \
                2>/dev/null || true
              echo "Closed resolved incident #$OPEN_ISSUE"
            else
              echo "All references OK and no open incident — nothing to do."
            fi
          fi
